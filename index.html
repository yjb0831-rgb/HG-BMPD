<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESHG 법인 Vision BMPD 분석 (ESHG Vision Downtime Analysis)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
        body { background-color: #f5f5f5; display: flex; justify-content: center; padding: 20px 10px; }
        .container { width: 100%; max-width: 450px; background: white; border: 1px solid #e0e0e0; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .header { background-color: #444; color: white; text-align: center; padding: 25px 15px; }
        .header h1 { font-size: 20px; font-weight: bold; margin-bottom: 10px; line-height: 1.4; }
        .header p { font-size: 13px; color: #ccc; }
        
        .tabs { background: #333; color: white; text-align: center; padding: 12px 0; font-size: 14px; font-weight: bold; }
        
        .form-body { padding: 20px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 6px; color: #111; }
        
        .time-input-group { display: flex; gap: 5px; }
        .btn-time { padding: 0 10px; background: #6c757d; color: white; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; white-space: nowrap; }
        .btn-time:hover { background: #5a6268; }

        select, input[type="text"], textarea {
            width: 100%; padding: 10px; font-size: 14px; border: 1px solid #ddd; border-radius: 4px; background-color: #fafafa; outline: none; color: #333;
        }
        select:focus, input[type="text"]:focus, textarea:focus { background-color: #fff; border-color: #888; }
        textarea { resize: vertical; min-height: 80px; }
        
        .btn-submit {
            width: 100%; background-color: #007bff; color: white; border: none; padding: 14px; font-size: 15px; font-weight: bold; border-radius: 4px; cursor: pointer;
        }
        .btn-submit:disabled { background-color: #ccc; cursor: not-allowed; }
        .footer-mark { text-align: right; color: #aaa; font-size: 12px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>ESHG 법인 Vision<br>BMPD 분석<br><span style="font-size:14px; font-weight:normal; color:#ddd;">(ESHG Vision Downtime Analysis)</span></h1>
        <p>지속 가능한 데이터 분석 시스템 (Sustainable Data Analysis System)</p>
    </div>
    
    <div class="tabs">부동 분석 리포트 생성 (Generate Downtime Analysis Report)</div>
    
    <div class="form-body">
        <div class="form-group">
            <label>종류 (Type) : *</label>
            <select id="type">
                <option value="-">-</option>
                <option value="BM">BM</option>
                <option value="PD">PD</option>
                <option value="PM">PM</option>
                <option value="ETC">ETC</option>
            </select>
        </div>

        <div class="form-group">
            <label>0. Site : *</label>
            <select id="site">
                <option value="-">-</option>
                <option value="ESHG">ESHG</option>
            </select>
        </div>

        <div class="form-group">
            <label>1-1. 공정 (Process) : *</label>
            <select id="process" onchange="filterDropdowns()">
                <option value="-">-</option>
                <option value="DNC">DNC</option>
                <option value="AZS">AZS</option>
                <option value="PKG">PKG</option>
                <option value="EOL">EOL</option>
            </select>
        </div>

        <div class="form-group">
            <label>1-2. 호기 (Unit No.) : *</label>
            <select id="hogi">
                <option value="-">-</option>
            </select>
        </div>

        <div class="form-group">
            <label>2-2. Vision Type : *</label>
            <select id="visionType">
                <option value="-">-</option>
            </select>
        </div>

        <div class="form-group">
            <label>2-3. 원인처 (Source of Cause) : *</label>
            <select id="source">
                <option value="-">-</option>
                <option value="Camera">Camera</option>
                <option value="Lighting">Lighting</option>
                <option value="PC">PC</option>
                <option value="전장 (Electricity)">전장 (Electricity)</option>
                <option value="S/W">S/W</option>
                <option value="H/W">H/W</option>
                <option value="ROI 수정 (ROI Modification)">ROI 수정 (ROI Modification)</option>
                <option value="Recipe 수정 (Recipe Modification)">Recipe 수정 (Recipe Modification)</option>
                <option value="Calibration">Calibration</option>
                <option value="공정불량 (Process Defect)">공정불량 (Process Defect)</option>
                <option value="설비기인 (Machine Issue)">설비기인 (Machine Issue)</option>
            </select>
        </div>

        <div class="form-group">
            <label>3-1. 발생시간 (Occurrence Time) :</label>
            <div class="time-input-group">
                <input type="text" id="startTime" onblur="validateTimeInput(this)">
                <button type="button" class="btn-time" onclick="setTimeField('startTime')">현재시간</button>
            </div>
        </div>

        <div class="form-group">
            <label>3-2. 조치완료 (Action Completed Time) :</label>
            <div class="time-input-group">
                <input type="text" id="endTime" onblur="validateTimeInput(this)">
                <button type="button" class="btn-time" onclick="setTimeField('endTime')">현재시간</button>
            </div>
        </div>

        <div class="form-group">
            <label>4. 작업자 (PIC) : *</label>
            <input type="text" id="worker" placeholder="이름 입력 (Enter Name)">
        </div>

        <div class="form-group">
            <label>5. 현상 (Phenomenon) : *</label>
            <textarea id="phenomenon" placeholder="현상 입력 (Enter Phenomenon)"></textarea>
        </div>

        <div class="form-group">
            <label>6. 원인 (Cause) : *</label>
            <textarea id="cause" placeholder="원인 입력 (Enter Cause)"></textarea>
        </div>

        <div class="form-group">
            <label>7. 조치 (Action) : *</label>
            <textarea id="action" placeholder="조치 내용 입력 (Enter Action)"></textarea>
        </div>

        <button class="btn-submit" id="submitBtn" onclick="saveAndCopy()">저장 및 리포트 복사 (Save & Copy Report)</button>
        <div class="footer-mark">HG Vision System</div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8d31jJuBmm8pNA3UWaEq-N5tuBfPHRbBaz4J3Hgk9KF-pqXh_mKyM52y6jCYjk13HqA/exec";

    const HOGI_MASTER = {
        "DNC": [
            "1A_양극", "1A_음극", "1B_양극", "1B_음극",
            "1C_양극", "1C_음극", "1D_양극", "1D_음극",
            "2A_양극", "2A_음극", "2B_양극", "2B_음극",
            "2C_양극", "2C_음극", "2D_양극", "2D_음극"
        ],
        "AZS": [
            "1A_1호기", "1A_2호기", "1A_3호기", "1A_4호기", "1A_5호기", "1A_6호기",
            "1B_1호기", "1B_2호기", "1B_3호기", "1B_4호기", "1B_5호기", "1B_6호기",
            "1C_1호기", "1C_2호기", "1C_3호기", "1C_4호기", "1C_5호기", "1C_6호기",
            "1D_1호기", "1D_2호기", "1D_3호기", "1D_4호기", "1D_5호기", "1D_6호기",
            "2A_1호기", "2A_2호기", "2A_3호기", "2A_4호기", "2A_5호기", "2A_6호기",
            "2B_1호기", "2B_2호기", "2B_3호기", "2B_4호기", "2B_5호기", "2B_6호기",
            "2C_1호기", "2C_2호기", "2C_3호기", "2C_4호기", "2C_5호기", "2C_6호기",
            "2D_1호기", "2D_2호기", "2D_3호기", "2D_4호기", "2D_5호기", "2D_6호기",
            "1-AB_Insp.", "1-CD_Insp.", "2-AB_Insp.", "2-CD_Insp."
        ],
        "PKG": [
            "P_#1-1", "P_#1-2", "P_#2-1", "P_#2-2", "P_#3-1", "P_#3-2", "P_#4-1", "P_#4-2", "P_#5-1", "P_#5-2", "P_#5-3"
        ],
        "EOL": [
            "E_#1-1", "E_#1-2", "E_#2-1", "E_#2-2", "E_#3-1", "E_#3-2", "E_#4-1", "E_#4-2", "E_#5-1", "E_#5-2", "E_#5-3"
        ]
    };

    const VISION_MASTER = {
        "DNC": [
            "Surface Vision", "Cutting Vision"
        ],
        "AZS": [
            "Align Vision", "Stack Vision", "Sepa Vision", "Top/Back Vision"
        ],
        "PKG": [
            "P_Lead align (+)", "P_Lead align (-)", "P_Pouch align", "P_Pouch crack", "P_Lead", 
            "P_Welding (+)", "P_Welding (-)", "P_X-ray tab (+)", "P_X-ray tab (-)", "P_CT machine", "P_Lead sealing"
        ],
        "EOL": [
            "E_EOL cosmetic", "E_Sealing thickness (Long)", "E_Sealing thickness (Short)"
        ]
    };

    window.onload = function() {
        filterDropdowns();
        initTime();
    };

    function filterDropdowns() {
        const process = document.getElementById('process').value;
        const hogiSelect = document.getElementById('hogi');
        const visionSelect = document.getElementById('visionType');
        
        hogiSelect.innerHTML = '<option value="-">-</option>';
        if (process !== "-" && HOGI_MASTER[process]) {
            HOGI_MASTER[process].forEach(name => {
                const opt = document.createElement('option');
                opt.value = name; opt.innerText = name;
                hogiSelect.appendChild(opt);
            });
        } else if (process === "-") {
            Object.keys(HOGI_MASTER).forEach(key => {
                HOGI_MASTER[key].forEach(name => {
                    if (!Array.from(hogiSelect.options).some(o => o.value === name)) {
                        const opt = document.createElement('option');
                        opt.value = name; opt.innerText = name;
                        hogiSelect.appendChild(opt);
                    }
                });
            });
        }

        visionSelect.innerHTML = '<option value="-">-</option>';
        if (process !== "-" && VISION_MASTER[process]) {
            VISION_MASTER[process].forEach(name => {
                const opt = document.createElement('option');
                opt.value = name; opt.innerText = name;
                visionSelect.appendChild(opt);
            });
        } else if (process === "-") {
            Object.keys(VISION_MASTER).forEach(key => {
                VISION_MASTER[key].forEach(name => {
                    if (!Array.from(visionSelect.options).some(o => o.value === name)) {
                        const opt = document.createElement('option');
                        opt.value = name; opt.innerText = name;
                        visionSelect.appendChild(opt);
                    }
                });
            });
        }
    }

    function getFormattedTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const date = String(now.getDate()).padStart(2, '0');
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        
        hours = hours % 12;
        hours = hours ? hours : 12;
        const hoursStr = String(hours).padStart(2, '0');
        
        return `${year}.${month}.${date}. ${ampm} ${hoursStr}:${minutes}`;
    }

    function setTimeField(fieldId) {
        document.getElementById(fieldId).value = getFormattedTime();
    }

    function initTime() {
        const timeStr = getFormattedTime();
        document.getElementById('startTime').value = timeStr;
        document.getElementById('endTime').value = timeStr;
    }

    // [핵심 추가] 초 단위 입력 여부 검증 함수 (한글 + 영문)
    function validateTimeInput(inputElement) {
        const val = inputElement.value.trim();
        
        // 정규식 설명: 콜론(:)이 두 개 들어가거나 문자열 끝에 초 단위가 매칭되는지 검사
        // 예시: "2026.06.11. PM 12:09:00" 처럼 시:분:초 형태 확인
        const secondRegex = /(AM|PM)\s+\d{2}:\d{2}:\d{2}$/i;
        const colonCount = (val.match(/:/g) || []).length;

        if (secondRegex.test(val) || colonCount >= 2) {
            alert("[경고] 초 단위를 제외하고 '시:분'까지만 입력해 주세요.\n(초는 입력 하지 마세요.)\n\n[Warning] Please enter up to 'Hour:Minute' only, excluding seconds.\n(Do not enter seconds.)");
            
            // 유저가 입력한 값에서 초 단위(:XX) 강제 전처리 슬라이싱 처리
            if (colonCount >= 2) {
                const lastColonIndex = val.lastIndexOf(':');
                inputElement.value = val.substring(0, lastColonIndex);
            }
            setTimeout(() => inputElement.focus(), 10);
            return false;
        }
        return true;
    }

    function saveAndCopy() {
        // 저장 직전 시간 필드 최종 무결성 검증 트리거
        const startTimeInput = document.getElementById('startTime');
        const endTimeInput = document.getElementById('endTime');

        if (!validateTimeInput(startTimeInput)) return;
        if (!validateTimeInput(endTimeInput)) return;

        const fieldsToValidate = [
            { id: 'type', name: '종류 (Type)' },
            { id: 'site', name: 'Site' },
            { id: 'process', name: '공정 (Process)' },
            { id: 'hogi', name: '호기 (Unit No.)' },
            { id: 'visionType', name: '2-2. Vision Type' },
            { id: 'source', name: '원인처 (Source of Cause)' }
        ];

        for (let field of fieldsToValidate) {
            if (document.getElementById(field.id).value === '-') {
                alert(`[경고] ${field.name} 항목을 선택해주세요.`);
                document.getElementById(field.id).focus();
                return;
            }
        }

        const textFields = [
            { id: 'worker', name: '작업자 (PIC)' },
            { id: 'phenomenon', name: '현상 (Phenomenon)' },
            { id: 'cause', name: '원인 (Cause)' },
            { id: 'action', name: '조치 (Action)' }
        ];

        for (let field of textFields) {
            if (!document.getElementById(field.id).value.trim()) {
                alert(`[경고] ${field.name} 내용을 입력해주세요.`);
                document.getElementById(field.id).focus();
                return;
            }
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "처리 중... (Processing...)";

        const data = {
            type: document.getElementById('type').value,
            site: document.getElementById('site').value,
            process: document.getElementById('process').value,
            hogi: document.getElementById('hogi').value,
            visionType: document.getElementById('visionType').value,
            source: document.getElementById('source').value,
            startTime: document.getElementById('startTime').value,
            endTime: document.getElementById('endTime').value,
            worker: document.getElementById('worker').value.trim(),
            phenomenon: document.getElementById('phenomenon').value.trim(),
            cause: document.getElementById('cause').value.trim(),
            action: document.getElementById('action').value.trim()
        };

        const report = `[부동 분석 공유 (Downtime Analysis Report)]
종류 (Type): ${data.type}
0. Site : ${data.site}
1-1. 공정 (Process) : ${data.process}
1-2. 호기 (Unit No.) : ${data.hogi}
2-2. Vision Type : ${data.visionType}
2-3. 원인처 (Source of Cause) : ${data.source}
3-1. 발생시간 (Occurrence Time) : ${data.startTime}
3-2. 조치완료 (Action Completed) : ${data.endTime}
4. 작업자 (PIC) : ${data.worker}
5. 현상 (Phenomenon) : ${data.phenomenon}
6. 원인 (Cause) : ${data.cause}
7. 조치 (Action) : ${data.action}`;

        fetch(SCRIPT_URL, { 
            method: "POST", 
            mode: "no-cors", 
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data) 
        })
        .then(() => {
            copyText(report, btn);
        })
        .catch(err => {
            console.error(err);
            copyText(report, btn);
        });
    }

    function copyText(text, btnElement) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => {
                alert("구글 시트에 데이터가 전송되었고, 리포트가 복사되었습니다!\n\n(Data sent and report copied!)");
                resetBtn(btnElement);
            }).catch(() => {
                fallbackCopy(text, btnElement);
            });
        } else {
            fallbackCopy(text, btnElement);
        }
    }

    function fallbackCopy(text, btnElement) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed"; 
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand("copy");
            alert("저장 및 복사가 완료되었습니다!\n(Save and copy completed!)");
        } catch (err) {
            alert("복사 실패 (Copy failed)");
        }
        document.body.removeChild(textarea);
        resetBtn(btnElement);
    }

    function resetBtn(btnElement) {
        btnElement.disabled = false;
        btnElement.innerText = "저장 및 리포트 복사 (Save & Copy Report)";
    }
</script>
</body>
</html>
